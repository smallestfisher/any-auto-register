services:
  app:
    build: .
    ports:
      - "8000:8000"   # FastAPI API
      - "6080:6080"   # noVNC (headed 浏览器预览)
    environment:
      - DISPLAY=:99
      - ACCOUNT_MANAGER_DATABASE_URL=sqlite:////app/data/account_manager.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
