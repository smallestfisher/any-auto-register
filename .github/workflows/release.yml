name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-cli-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller

      - name: Build standalone backend package
        run: |
          pyinstaller --onedir --name account-manager \
            --add-data "platforms:platforms" \
            --add-data "core:core" \
            --add-data "api:api" \
            --add-data "application:application" \
            --add-data "infrastructure:infrastructure" \
            --add-data "domain:domain" \
            --add-data "services:services" \
            --add-data "resources:resources" \
            main.py
          tar -czf account-manager-linux.tar.gz -C dist account-manager

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-builds
          path: account-manager-linux.tar.gz
          if-no-files-found: error

  release:
    needs: [build-cli-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download CLI builds
        uses: actions/download-artifact@v4
        with:
          name: cli-builds
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
